# environment.yml
name: cap-pipeline
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # Core R and R packages
  # Pinning to 4.4.* allows patch updates (e.g. 4.4.4) which maintains binary compatibility
  # but allows for security/bug fixes and easier dependency resolution.
  - r-base=4.4
  - r-seqinr
  - r-stringr
  - r-stringdist
  - r-scales
  - r-ape
  - r-doparallel
  - r-getopt
  - r-renv
  - bioconductor-biostrings
  - bioconductor-genomicranges
  - bioconductor-iranges
  - bioconductor-msa
  
  # Python and data science
  - python=3.11
  - pandas
  - numpy
  - joblib
  - xgboost
  - scikit-learn
  
  # Bioinformatics tools
  - mafft
  - hmmer
  
  # Version control and workflow
  - git
  - nextflow

  # Build and compilation tools for R packages
  - cmake
  - make
  - c-compiler
  - cxx-compiler
  - gsl
  - libblas
  - liblapack
  
  # Additional utilities
  - glpk